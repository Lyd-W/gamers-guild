<!-- Required for accessibilty tools for toasts -->
<div class="toast info-toast" 
    role="alert" aria-live="assertive" aria-atomic="true">
    <div class="arrow-up arrow-info"></div>
  <div class="toast-header">
    <p class="toast-header-title">Information</p>
      <button type="button" class="toast-close" data-bs-dismiss="toast" aria-label="Close">
            <i class="fas fa-times"></i>
      </button>
  </div>

  <div class="toast-body">
    {{ message }}
  </div>
</div>
