<!-- Required for accessibilty tools for toasts -->
<div class="toast warning-toast"
    role="alert" aria-live="assertive" aria-atomic="true">
    <div class="arrow-up arrow-warning"></div>
      <div class="toast-header toast-header-warning">
        <p class="toast-header-title">Warning</p>
        <button type="button" class="toast-close" data-bs-dismiss="toast" aria-label="Close">
          <i class="bi bi-x-lg"></i>
      </button>
      </div>

  <div class="toast-body">
    {{ message }}
  </div>
</div>
