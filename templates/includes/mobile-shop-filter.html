 <div class="d-md-none mb-2">
  <button class="btn filters-btn w-100" 
          type="button" 
          data-bs-toggle="collapse" 
          data-bs-target="#mobileFiltersCollapse" 
          aria-expanded="false" 
          aria-controls="mobileFiltersCollapse">
    <i class="fas fa-filter me-2"></i> Filters
  </button>

  <div class="collapse" id="mobileFiltersCollapse">
    <div class="card card-body p-3">
      <p class="filter-header">Filter By:</p>
      <p class="categories-header">Category</p>
    <div class='filter-wrapper-mobile'>
      <form method="GET" action="{% url 'shop' %}">
        {% for category in categories %}
          <div class="form-check mb-1">
            <input class="form-check-input" 
                   type="checkbox" 
                   name="category" 
                   value="{{ category.type }}" 
                   id="mobileCategory{{ forloop.counter }}"
                   onchange="this.form.submit()"
                   {% if category.type in current_categories %}checked{% endif %}>
            <label class="form-check-label text-light" for="mobileCategory{{ forloop.counter }}">
              {{ category.readable_type|default:category.type }}
            </label>
          </div>
        {% endfor %}
      </form>
    </div>

      <a href="{% url 'shop' %}" class="btn clear-filters-btn">
        Clear Filters
      </a>
    </div>
  </div>
</div>
