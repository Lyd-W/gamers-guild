<select id="sort-selector"
        class="form-select form-select-sm w-auto"
        aria-label="Sort by dropdown">

  <option value="reset"
          {% if current_sorting == 'None_None' %}selected{% endif %}>
    Sort by...
  </option>

  <option value="title_asc"
          {% if current_sorting == 'title_asc' %}selected{% endif %}>
    Title (A to Z)
  </option>

  <option value="title_desc"
          {% if current_sorting == 'title_desc' %}selected{% endif %}>
    Title (Z to A)
  </option>

  <option value="rating_asc"
          {% if current_sorting == 'rating_asc' %}selected{% endif %}>
    Rating (low to high)
  </option>

  <option value="rating_desc"
          {% if current_sorting == 'rating_desc' %}selected{% endif %}>
    Rating (high to low)
  </option>

  <option value="playtime_asc"
          {% if current_sorting == 'playtime_asc' %}selected{% endif %}>
    Playtime (Low to High)
  </option>

  <option value="playtime_desc"
          {% if current_sorting == 'playtime_desc' %}selected{% endif %}>
    Playtime (High to Low)
  </option>

  <option value="release_year_asc"
          {% if current_sorting == 'release_year_asc' %}selected{% endif %}>
    Released (Oldest to Newest)
  </option>

  <option value="release_year_desc"
          {% if current_sorting == 'release_year_desc' %}selected{% endif %}>
    Released (Newest to Oldest)
  </option>

</select>
