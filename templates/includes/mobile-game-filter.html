<div class="accordion" id="filterAccordion">

  <div class="accordion-item">

    <h2 class="accordion-header" id="headingGenre">
      <button class="accordion-button collapsed d-flex align-items-center"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#collapseGenre"
              aria-expanded="false"
              aria-controls="collapseGenre">
        <span>Genre</span>
        <i class="fa-solid fa-chevron-down ms-auto accordion-icon"></i>
      </button>
    </h2>

    <div id="collapseGenre"
         class="accordion-collapse collapse"
         role="region"
         aria-labelledby="headingGenre">

      <div class="accordion-body">

        <form method="get" action="{% url 'home' %}">

          <fieldset>
            <legend class="visually-hidden">Game genres</legend>

            {% for genre in genres %}
              <div class="genre-badge form-check">

                <input class="form-check-input"
                       type="checkbox"
                       name="genre"
                       value="{{ genre.id }}"
                       id="genre_{{ genre.id }}"
                       onchange="this.form.submit()"
                       {% if genre.id|stringformat:'s' in current_genres %}checked{% endif %}>

                <label class="form-check-label" for="genre_{{ genre.id }}">
                  {{ genre.name }}
                </label>

              </div>
            {% endfor %}

          </fieldset>

        </form>

      </div>
    </div>
  </div>

  <div class="accordion-item">

    <h2 class="accordion-header" id="headingPlayers">
      <button class="accordion-button collapsed d-flex align-items-center"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#collapsePlayers"
              aria-expanded="false"
              aria-controls="collapsePlayers">
        <span>Player Count</span>
        <i class="fa-solid fa-chevron-down ms-auto accordion-icon"></i>
      </button>
    </h2>

    <div id="collapsePlayers"
         class="accordion-collapse collapse"
         role="region"
         aria-labelledby="headingPlayers">

      <div class="accordion-body">

        <form method="get" action="{% url 'home' %}">

          <fieldset>
            <legend class="visually-hidden">Number of players</legend>

            {% for p in player_options %}
              <div class="player-badge form-check">

                <input class="form-check-input"
                       type="checkbox"
                       name="players"
                       value="{{ p }}"
                       id="players_{{ p }}"
                       onchange="this.form.submit()"
                       {% if p|stringformat:'s' in current_players %}checked{% endif %}>

                <label class="form-check-label" for="players_{{ p }}">
                  {% if p == 1 %}
                    1 Player
                  {% elif p == 6 %}
                    6+ Players
                  {% else %}
                    {{ p }} Players
                  {% endif %}
                </label>

              </div>
            {% endfor %}

          </fieldset>

        </form>

      </div>
    </div>
  </div>

  <div class="accordion-item">

    <h2 class="accordion-header" id="headingPlaytime">
      <button class="accordion-button collapsed d-flex align-items-center"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#collapsePlaytime"
              aria-expanded="false"
              aria-controls="collapsePlaytime">
        <span>Playtime</span>
        <i class="fa-solid fa-chevron-down ms-auto accordion-icon"></i>
      </button>
    </h2>

    <div id="collapsePlaytime"
         class="accordion-collapse collapse"
         role="region"
         aria-labelledby="headingPlaytime">

      <div class="accordion-body">

        <form method="get" action="{% url 'home' %}">

          <label for="playtimeSlider" id="playtimeLabel" class="mb-2">
            Max Playtime (minutes)
          </label>

          <input class="slider form-range"
                 type="range"
                 id="playtimeSlider"
                 name="playtime"
                 min="0"
                 max="300"
                 value="{{ request.GET.playtime|default:90 }}"
                 oninput="syncFromSlider(this.value)">

          <div class="d-flex align-items-center gap-2 mt-2">

            <input type="number"
                   id="playtimeInput"
                   name="playtime"
                   class="form-control"
                   min="0"
                   max="300"
                   value="{{ request.GET.playtime|default:90 }}"
                   aria-labelledby="playtimeLabel"
                   oninput="syncFromInput(this.value)">

            <span>mins</span>

          </div>

          <button type="submit"
                  class="btn btn-sm mt-2">
            Apply
          </button>

        </form>

      </div>
    </div>
  </div>

</div>
