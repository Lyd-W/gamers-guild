{% extends "base.html" %}

{% load static %}

{% block page_header %}
    <div class="container header-container">
        <div class="row">
            <div class="col"></div>
        </div>
    </div>
{% endblock %}

{% block content %}
    <div class="home-page-title">
                <h1>
                    Welcome to the Gamers Guild Shop
                </h1>
            </div>
        </div>
    </div>

<div class="container-fluid">
  <div class="card-display row">
    <div class="col-12 mt-3">
      <div class="row g-4">
        {% for product in products %}
        <div class="col-md-4 d-flex">
          <article class="product-card h-100 w-100">
            {% if product.image %}
            <img
              src="{{ product.image.url }}"
              class="card-img-top"
              alt="{{ product.name }}"
            >
            {% else %}
            <img
              class="card-img-top"
              alt="product placeholder"
            >
            {% endif %}
            <div class="card-body">
              <h2 class="card-title">
                <a href="{% url 'product_detail' product.id %}"
                class="product-link">
                {{ product.name }}</a>
              </h2>
              <div class="price"> £{{ product.price}}
            </div>
          </article>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
    
{% endblock %}
