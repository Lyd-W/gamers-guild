{% if widget.is_initial %}
  <div class="mb-2">
    <p class="form-text">{{ widget.initial_text }}:</p>

    <a href="{{ widget.value.url }}">
      <img src="{{ widget.value.url }}"
           class="img-thumbnail"
           style="max-width: 140px;">
    </a>

    {% if not widget.required %}
      <div class="form-check mt-2">
        <input class="form-check-input"
               type="checkbox"
               name="{{ widget.checkbox_name }}"
               id="{{ widget.checkbox_id }}">
        <label class="form-check-label text-danger"
               for="{{ widget.checkbox_id }}">
          {{ widget.clear_checkbox_label }}
        </label>
      </div>
    {% endif %}
  </div>
{% endif %}

<input type="file"
       name="{{ widget.name }}"
       id="id_{{ widget.name }}"
       class="d-none"
       {% include "django/forms/widgets/attrs.html" %}>

<label for="id_{{ widget.name }}" class="btn btn-primary">
    <svg xmlns="http://www.w3.org/2000/svg" 
         width="16" 
         height="16" 
         fill="currentColor" 
         class="bi bi-upload" 
         viewBox="0 0 16 16"
         aria-hidden="true">
      <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
      <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
    </svg> Choose Image
</label>

<small class="text-muted d-block mt-1" id="filename"></small>
